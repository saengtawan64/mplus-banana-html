<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>เป้าสาขา | Mplus Banana</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-page="staff-targets">
    <header class="app-header">
      <a class="brand" href="index.html">Mplus Banana</a>
      <nav class="top-nav" aria-label="เมนูหลัก"></nav>
    </header>

    <main class="page-shell">
      <section class="topbar-card" aria-label="บริบทเป้าสาขา">
        <div>
          <h2>เป้าแบรนด์โฟกัส</h2>
          <p class="panel-kicker">ดูระดับสาขาเท่านั้น ไม่ใช่ยอดขายรายบุคคลของพนักงาน</p>
        </div>
        <div class="topbar-meta">
          <span class="pill yellow">ระดับสาขา</span>
          <span class="pill gray">ข้อมูลตัวอย่าง</span>
        </div>
      </section>

      <section class="page-heading">
        <div>
          <p class="eyebrow">เป้าสาขา</p>
          <h1>ความคืบหน้าแบรนด์โฟกัส</h1>
          <p class="page-subtitle">ใช้ดูภาพรวมทีมระดับสาขาเท่านั้น ไม่ใช่การนับยอดรายบุคคล</p>
        </div>
      </section>

      <div class="notice neutral">
        หน้านี้แสดงความคืบหน้าแบรนด์โฟกัสระดับสาขาเท่านั้น ไม่ใช่ยอดขายรายบุคคลของพนักงาน
      </div>

      <section class="filter-bar" aria-label="ตัวกรองเป้าสาขา">
        <label>สาขา <select id="targetBranch"></select></label>
        <label>เดือน <input id="targetMonth" type="month"></label>
      </section>

      <section class="metric-grid target-grid" id="targetCards" aria-label="ความคืบหน้าเป้าสาขา"></section>
    </main>

    <script type="module" src="js/staff-targets.js"></script>
  </body>
</html>
